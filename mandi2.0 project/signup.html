<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Mandi-Agent 2.0</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: url('assets/farmer_bg.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: -1;
        }

        .login-card {
            width: 450px;
            padding: 50px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--accent-primary);
        }

        .login-footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-option {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .role-option:hover {
            border-color: var(--accent-primary);
        }

        .role-option.active {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="glass-card login-card">
        <div class="logo" style="margin-bottom: 10px;">MANDI-AGENT <span style="font-weight: 300;">2.0</span></div>
        <h1>Create Account</h1>
        <div class="role-selector">
            <div class="role-option active" id="role-farmer">Farmer</div>
            <div class="role-option" id="role-buyer">Buyer</div>
            <div class="role-option" id="role-logistics">Logistics</div>
        </div>
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                Get Started <i class="fas fa-rocket" style="margin-left: 10px;"></i>
            </button>
        </form>
        <div class="login-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>
    <script>
        const options = document.querySelectorAll('.role-option');
        let selectedRole = 'farmer';

        options.forEach(opt => {
            opt.addEventListener('click', () => {
                options.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedRole = opt.id.split('-')[1];
            });
        });

        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = selectedRole + '.html';
        });
    </script>
</body>
</html>
